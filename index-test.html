<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mathématiques - Haddad Lotfi</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f7f9; }
        .container { max-width: 1100px; margin: auto; }
        .section { background: white; margin-bottom: 20px; border-radius: 10px; overflow: hidden; }
        .section h2 { background: #1e3c72; color: white; padding: 15px; margin: 0; cursor: pointer; }
        .content { padding: 15px; display: none; }
        .section.open .content { display: block; }
        ul { list-style: none; padding: 0; }
        li { margin: 8px 0; }
        a { color: #2a5298; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="color:#1e3c72;">📐 Haddad Lotfi - Mathématiques</h1>

    <!-- SECTION MP -->
    <div class="section">
        <h2>📘 MP - Cours Maths 1</h2>
        <div class="content" id="mp-content">Chargement...</div>
    </div>
</div>

<script>
// Version SIMPLE et qui MARCHE
const dossiers = [
    { id: 'mp-content', chemin: 'MP/Maths%201/Cours' }
];

async function charger(containerId, chemin) {
    const container = document.getElementById(containerId);
    try {
        const reponse = await fetch(`https://api.github.com/repos/lotfihaddad-dot/lotfihaddad-dot.github.io/contents/${chemin}`);
        const fichiers = await reponse.json();
        
        if (!Array.isArray(fichiers)) {
            container.innerHTML = '<em>Dossier vide ou introuvable</em>';
            return;
        }
        
        const pdfs = fichiers.filter(f => f.name.endsWith('.pdf'));
        if (pdfs.length === 0) {
            container.innerHTML = '<em>Aucun PDF trouvé</em>';
            return;
        }
        
        let html = '<ul>';
        for (const pdf of pdfs) {
            html += `<li><a href="${pdf.download_url}" target="_blank">📄 ${pdf.name}</a></li>`;
        }
        html += '</ul>';
        container.innerHTML = html;
    } catch (erreur) {
        container.innerHTML = '<em>Erreur de chargement</em>';
    }
}

// Chargement
for (const dossier of dossiers) {
    charger(dossier.id, dossier.chemin);
}

// Accordéon
document.querySelectorAll('.section h2').forEach(h2 => {
    h2.addEventListener('click', () => {
        h2.parentElement.classList.toggle('open');
    });
});
</script>
</body>
</html>
