<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Problèmes MP</title>
</head>
<body>
    <h1>📚 Problèmes MP</h1>
    <ul id="liste-docs"></ul>
    <p><a href="../../index.html">← Retour à l'accueil</a></p>

    <script>
        const fichiers = [];
        const xhr = new XMLHttpRequest();
        xhr.open('GET', './', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                const lignes = xhr.responseText.split('\n');
                lignes.forEach(ligne => {
                    const match = ligne.match(/<a href="([^"]+\.pdf)"/i);
                    if (match) {
                        fichiers.push(match[1]);
                    }
                });
                const ul = document.getElementById('liste-docs');
                if (fichiers.length === 0) {
                    ul.innerHTML = '<li>Aucun problème pour le moment.</li>';
                } else {
                    fichiers.forEach(fichier => {
                        const li = document.createElement('li');
                        const a = document.createElement('a');
                        a.href = fichier;
                        a.textContent = fichier.replace(/\.pdf$/i, '');
                        li.appendChild(a);
                        ul.appendChild(li);
                    });
                }
            }
        };
        xhr.send();
    </script>
</body>
</html>
